# Publishes to npm via Trusted Publisher (OIDC) — no long-lived npm token required.
# Trigger: GitHub Release published, or manual "Run workflow".
#
# npm package Settings → Trusted Publisher must match:
#   Organization/user: aljojoby9
#   Repository:        krutrim-ai-sdk
#   Workflow filename: publish.yml
#   Environment:       (leave empty unless you set one below)
name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publisher / OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # registry-url injects a dummy NODE_AUTH_TOKEN that breaks OIDC publish —
          # configure the registry manually below instead.

      - name: Use latest npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type-check, test, build
        run: |
          npm run type-check
          npm test
          npm run build

      - name: Publish to npm (Trusted Publisher)
        run: |
          npm config set //registry.npmjs.org/:_authToken=""
          unset NODE_AUTH_TOKEN
          npm publish --access public --provenance
