# Publishes to npm via Trusted Publisher (OIDC) — no long-lived npm token required.
# Trigger: GitHub Release published, or manual "Run workflow".
name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publisher / OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type-check, test, build
        run: |
          npm run type-check
          npm test
          npm run build

      # Trusted Publisher authenticates via OIDC — do not set NODE_AUTH_TOKEN
      - name: Publish to npm
        run: npm publish --access public --provenance
